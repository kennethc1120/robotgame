<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math SRW: EVA Tactical Interface (Level System Update)</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React, ReactDOM 與 Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Math.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');

        body { background-color: #050505; margin: 0; overflow-x: hidden; font-family: 'Noto Sans TC', sans-serif; color: #fb923c; }
        canvas { image-rendering: auto; cursor: crosshair; }
        ::-webkit-scrollbar { display: none; }
        
        .eva-panel {
            background: linear-gradient(180deg, rgba(251, 146, 60, 0.1) 0%, rgba(0, 0, 0, 0.9) 100%);
            border-top: 2px solid #fb923c;
        }

        .eva-input {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #fb923c;
            color: #fb923c;
            text-shadow: 0 0 10px #fb923c;
        }

        .eva-button {
            background-color: #fb923c;
            color: #000;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: all 0.2s;
            font-weight: 900;
        }

        .eva-button:hover {
            background-color: #fff;
            box-shadow: 0 0 20px #fb923c;
        }

        .emergency-blink {
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            position: relative;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const BG_IMAGE_URL = 'https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1200&q=80';
        const ENEMY_IMAGE_URL = './img/enemy.png'; 
        const ALLY_IMAGE_URL = './img/alliance.png'; 

        const App = () => {
            const canvasRef = useRef(null);
            const containerRef = useRef(null);
            const enemyImgRef = useRef(null);
            const allyImgRef = useRef(null);
            const bgImgRef = useRef(null);
            
            const [level, setLevel] = useState(1);
            const [userInput, setUserInput] = useState('');
            const [message, setMessage] = useState('MAGI 系統已連線。等待指令。');
            const [isAssetsLoaded, setIsAssetsLoaded] = useState(false);
            const [isFiring, setIsFiring] = useState(false);
            const [internalPower, setInternalPower] = useState(100);
            
            const [canvasSize, setCanvasSize] = useState({ width: 800, height: 450 });
            const gridScale = 40; 

            // 關卡數據定義 (包含防禦網 forbidden line)
            const levelData = {
                1: {
                    enemies: [{ id: 1, x: 2, y: 4, alive: true, label: '第3使徒' }, { id: 2, x: -2, y: 4, alive: true, label: '第4使徒' }],
                    allies: [],
                    hint: "雙重目標鎖定。請運用「二次函數」的對稱特性進行打擊。",
                    typeReq: "quadratic",
                    errorMsg: "ERROR: 武器不符！指揮部要求使用「二次函數」(需包含 ^2)。"
                },
                2: {
                    enemies: [{ id: 3, x: 4, y: 2, alive: true, label: '第5使徒' }, { id: 4, x: -4, y: -2, alive: true, label: '第6使徒' }],
                    allies: [{ id: 101, x: -2, y: 2, label: '支援機A' }, { id: 102, x: 2, y: -2, label: '支援機B' }, { id: 103, x: 0, y: 3, label: '運輸艦' }],
                    hint: "目標呈傾斜直線排列。請設定正確斜率的「線性函數」。",
                    typeReq: "linear",
                    errorMsg: "ERROR: 武器不符！此空域僅限使用「線性函數」(不可包含 ^2)。"
                },
                3: {
                    enemies: [{ id: 5, x: 3, y: -4, alive: true, label: '第7使徒' }, { id: 6, x: -3, y: -4, alive: true, label: '第8使徒' }],
                    allies: [{ id: 104, x: 0, y: 0, label: '初號機' }, { id: 105, x: 0, y: -2, label: '零號機' }, { id: 106, x: 2, y: 0, label: '二號機' }, { id: 107, x: -2, y: 0, label: '防衛陣地' }],
                    hint: "目標位於下方空域，友軍在原點附近。請反轉「二次函數」的開口方向。",
                    typeReq: "quadratic",
                    errorMsg: "ERROR: 武器不符！指揮部要求使用「二次函數」(需包含 ^2)。"
                },
                4: {
                    enemies: [{ id: 7, x: 4, y: 3, alive: true, label: '第9使徒' }, { id: 8, x: 2, y: 3, alive: true, label: '第10使徒' }],
                    allies: [{ id: 108, x: 3, y: 0, label: '總部' }, { id: 109, x: 3, y: 1, label: '發射台' }, { id: 110, x: 1, y: 4, label: '巡洋艦' }, { id: 111, x: 5, y: 4, label: '驅逐艦' }],
                    hint: "目標偏向右側。請平移「二次函數」的頂點，精準穿透防線。",
                    typeReq: "quadratic",
                    errorMsg: "ERROR: 武器不符！指揮部要求使用「二次函數」(需包含 ^2)。"
                },
                5: {
                    enemies: [{ id: 9, x: 2, y: 3, alive: true, label: '第11使徒' }, { id: 10, x: -2, y: 3, alive: true, label: '第12使徒' }],
                    allies: [{ id: 112, x: 0, y: 1, label: '初號機' }],
                    forbidden: { y: 0, label: '赤道防禦網 (y=0)' },
                    hint: "新增絕對防禦網 (y=0)。武器軌跡不可觸碰此直線！",
                    typeReq: "quadratic",
                    errorMsg: "ERROR: 武器不符！指揮部要求使用「二次函數」(需包含 ^2)。"
                },
                6: {
                    enemies: [{ id: 11, x: 3, y: -3, alive: true, label: '第13使徒' }, { id: 12, x: -3, y: -3, alive: true, label: '第14使徒' }],
                    allies: [{ id: 113, x: 0, y: -5, label: 'NERV總部' }],
                    forbidden: { y: 2, label: '高空防禦網 (y=2)' },
                    hint: "最終作戰：避開上方防禦網 (y=2) 與下方友軍，精準打擊目標！",
                    typeReq: "quadratic",
                    errorMsg: "ERROR: 武器不符！指揮部要求使用「二次函數」(需包含 ^2)。"
                }
            };

            const [enemies, setEnemies] = useState(levelData[1].enemies);
            const [allies, setAllies] = useState(levelData[1].allies);
            const [explosions, setExplosions] = useState([]);

            const animationRef = useRef(null);

            useEffect(() => {
                const current = levelData[level];
                if (current) {
                    setEnemies(current.enemies);
                    setAllies(current.allies || []);
                    setMessage(`關卡 ${level} - ${current.hint}`);
                    setUserInput(''); // 每關開始清空輸入
                }
            }, [level]);

            useEffect(() => {
                const handleResize = () => {
                    if (containerRef.current) {
                        const { clientWidth, clientHeight } = containerRef.current;
                        setCanvasSize({ width: clientWidth, height: clientHeight });
                    }
                };
                const resizeObserver = new ResizeObserver(handleResize);
                if (containerRef.current) resizeObserver.observe(containerRef.current);
                handleResize();
                return () => resizeObserver.disconnect();
            }, []);

            useEffect(() => {
                let loadedCount = 0;
                const checkAllLoaded = () => {
                    loadedCount++;
                    if (loadedCount >= 3) setIsAssetsLoaded(true);
                };
                
                const eImg = new Image(); eImg.src = ENEMY_IMAGE_URL; 
                eImg.onload = () => { enemyImgRef.current = eImg; checkAllLoaded(); };
                eImg.onerror = checkAllLoaded;

                const aImg = new Image(); aImg.src = ALLY_IMAGE_URL; 
                aImg.onload = () => { allyImgRef.current = aImg; checkAllLoaded(); };
                aImg.onerror = checkAllLoaded;

                const bImg = new Image(); bImg.src = BG_IMAGE_URL; 
                bImg.onload = () => { bgImgRef.current = bImg; checkAllLoaded(); };
                bImg.onerror = checkAllLoaded;
                
                const timer = setInterval(() => {
                    setInternalPower(prev => prev > 0 ? prev - 0.05 : 0);
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const drawFrame = (ctx, currentEnemies, currentAllies, currentExplosions, width, height) => {
                const centerX = width / 2;
                const centerY = height / 2;

                ctx.clearRect(0, 0, width, height);

                if (bgImgRef.current) {
                    const img = bgImgRef.current;
                    const scale = Math.max(width / img.width, height / img.height);
                    const x = (width / 2) - (img.width / 2) * scale;
                    const y = (height / 2) - (img.height / 2) * scale;
                    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                    ctx.fillRect(0, 0, width, height);
                }

                ctx.strokeStyle = 'rgba(251, 146, 60, 0.15)';
                ctx.lineWidth = 1;
                for (let x = centerX % gridScale; x < width; x += gridScale) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
                }
                for (let y = centerY % gridScale; y < height; y += gridScale) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
                }

                ctx.strokeStyle = '#fb923c';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(width, centerY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, height); ctx.stroke();
                
                // 繪製不可觸碰的防禦線
                const currentLevelData = levelData[level];
                if (currentLevelData && currentLevelData.forbidden) {
                    const fbY = centerY - currentLevelData.forbidden.y * gridScale;
                    ctx.strokeStyle = '#ff00ff'; // 紫紅色警告線
                    ctx.lineWidth = 3;
                    ctx.setLineDash([15, 10]);
                    ctx.beginPath(); ctx.moveTo(0, fbY); ctx.lineTo(width, fbY); ctx.stroke();
                    ctx.setLineDash([]);
                    
                    ctx.fillStyle = '#ff00ff';
                    ctx.font = '900 12px sans-serif';
                    ctx.fillText(`WARNING: ${currentLevelData.forbidden.label}`, 20, fbY - 10);
                }

                currentEnemies.forEach(en => {
                    if (!en.alive) return;
                    const sx = centerX + en.x * gridScale;
                    const sy = centerY - en.y * gridScale;
                    
                    if (enemyImgRef.current) {
                        ctx.drawImage(enemyImgRef.current, sx - 18, sy - 18, 36, 36);
                    } else {
                        ctx.fillStyle = '#ff4400';
                        ctx.beginPath(); ctx.arc(sx, sy, 15, 0, Math.PI*2); ctx.fill();
                    }
                    
                    ctx.strokeStyle = '#ff4400';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(sx, sy, 25, 0, Math.PI*2); ctx.stroke();
                    
                    ctx.fillStyle = '#ff4400';
                    ctx.font = '900 10px sans-serif';
                    ctx.fillText(`TARGET: ${en.label}`, sx + 30, sy - 2);
                    ctx.fillText(`COORD: (${en.x}, ${en.y})`, sx + 30, sy + 10);
                });

                currentAllies.forEach(al => {
                    const sx = centerX + al.x * gridScale;
                    const sy = centerY - al.y * gridScale;
                    
                    if (allyImgRef.current) {
                        ctx.drawImage(allyImgRef.current, sx - 16, sy - 16, 32, 32);
                    } else {
                        ctx.fillStyle = '#00ffff';
                        ctx.beginPath(); ctx.arc(sx, sy, 12, 0, Math.PI*2); ctx.fill();
                    }
                    
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.setLineDash([5, 3]); ctx.arc(sx, sy, 22, 0, Math.PI*2); ctx.stroke();
                    ctx.setLineDash([]);
                    
                    ctx.fillStyle = '#00ffff';
                    ctx.font = '900 10px sans-serif';
                    ctx.fillText(`ALLY: ${al.label}`, sx + 25, sy - 2);
                    ctx.fillText(`COORD: (${al.x}, ${al.y})`, sx + 25, sy + 10);
                });

                currentExplosions.forEach(exp => {
                    const sx = centerX + exp.x * gridScale;
                    const sy = centerY - exp.y * gridScale;
                    const radius = exp.frame * 2.5;
                    const alpha = 1 - (exp.frame / 20);
                    
                    ctx.save();
                    ctx.beginPath(); ctx.arc(sx, sy, radius, 0, Math.PI * 2);
                    
                    // 根據引爆類型給予不同顏色的爆炸
                    let outerColor = `rgba(255, 80, 0, ${alpha})`;
                    let innerColor = `rgba(255, 200, 0, ${alpha})`;
                    if (exp.type === 'ally') {
                        outerColor = `rgba(0, 255, 255, ${alpha})`;
                        innerColor = `rgba(200, 255, 255, ${alpha})`;
                    } else if (exp.type === 'forbidden') {
                        outerColor = `rgba(255, 0, 255, ${alpha})`;
                        innerColor = `rgba(255, 150, 255, ${alpha})`;
                    }

                    ctx.fillStyle = outerColor;
                    ctx.fill();
                    
                    ctx.beginPath(); ctx.arc(sx, sy, radius * 0.7, 0, Math.PI * 2);
                    ctx.fillStyle = innerColor;
                    ctx.fill();
                    ctx.restore();
                });
            };

            useEffect(() => {
                if (isAssetsLoaded && canvasRef.current) {
                    const ctx = canvasRef.current.getContext('2d');
                    drawFrame(ctx, enemies, allies, explosions, canvasSize.width, canvasSize.height);
                }
            }, [enemies, allies, explosions, isAssetsLoaded, canvasSize]);

            useEffect(() => {
                if (explosions.length > 0) {
                    const timer = requestAnimationFrame(() => {
                        setExplosions(prev => prev
                            .map(exp => ({ ...exp, frame: exp.frame + 1 }))
                            .filter(exp => exp.frame < 20)
                        );
                    });
                    return () => cancelAnimationFrame(timer);
                }
            }, [explosions]);

            const handleFire = () => {
                if (isFiring || !userInput.trim()) return;
                
                // --- 武器要求驗證 ---
                const currentLevelData = levelData[level];
                const cleanInput = userInput.replace(/\s/g, '').toLowerCase();
                const isQuadratic = cleanInput.includes('^2') || cleanInput.includes('x*x') || cleanInput.includes('xx') || cleanInput.includes('x^');
                
                if (currentLevelData.typeReq === 'quadratic' && !isQuadratic) {
                    setMessage(currentLevelData.errorMsg);
                    return;
                }
                if (currentLevelData.typeReq === 'linear' && isQuadratic) {
                    setMessage(currentLevelData.errorMsg);
                    return;
                }
                // -------------------

                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let isTerminated = false;

                try {
                    const preparedInput = userInput.replace(/(\d)(x)/g, '$1*$2');
                    const node = math.parse(preparedInput);
                    const code = node.compile();
                    
                    // 測試公式是否能正常計算
                    code.evaluate({ x: 0 }); 

                    setIsFiring(true);
                    setMessage('同步率上升。陽電子炮發射！');

                    let currentScreenX = 0;
                    const centerX = canvasSize.width / 2;
                    const centerY = canvasSize.height / 2;

                    const animate = () => {
                        if (isTerminated) return;

                        if (currentScreenX > canvasSize.width) {
                            setIsFiring(false);
                            // 檢查是否成功擊破「所有」敵人
                            setEnemies(prev => {
                                const allDead = prev.every(e => !e.alive);
                                if (allDead) {
                                    if (level < 6) {
                                        setMessage(`>> 目標消滅。準備進入 LEVEL ${level + 1}。`);
                                        setTimeout(() => setLevel(l => l + 1), 2000);
                                    } else {
                                        setMessage('>> 最終目標沈默。所有作戰任務完全達成！');
                                    }
                                } else {
                                    // 若未能一擊全滅，則任務失敗並重置
                                    setMessage('!!! 警報 !!! 未能一擊殲滅所有目標。任務失敗，系統重置。');
                                    setTimeout(() => {
                                        resetGame();
                                    }, 2000);
                                }
                                return prev;
                            });
                            return;
                        }
                        
                        ctx.strokeStyle = '#fb923c';
                        ctx.lineWidth = 6;
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = '#ff3300';
                        
                        const step = 25;
                        const startX = currentScreenX;
                        const endX = currentScreenX + step;
                        
                        const calcY = (screenX) => {
                            const mathX = (screenX - centerX) / gridScale;
                            const mathY = code.evaluate({ x: mathX });
                            return centerY - mathY * gridScale;
                        };

                        const y1 = calcY(startX);
                        const y2 = calcY(endX);

                        if (!isNaN(y1) && !isNaN(y2)) {
                            ctx.beginPath(); ctx.moveTo(startX, y1); ctx.lineTo(endX, y2); ctx.stroke();
                            
                            // 檢查是否觸碰絕對防禦網 (Forbidden Line)
                            if (currentLevelData.forbidden) {
                                const fScreenY = centerY - currentLevelData.forbidden.y * gridScale;
                                // 若 y1 和 y2 在防禦線的兩側或剛好觸碰，則判定為碰撞
                                if ((y1 - fScreenY) * (y2 - fScreenY) <= 0) {
                                    const hitX = startX + (endX - startX) / 2;
                                    setExplosions(exps => [...exps, { x: (hitX - centerX)/gridScale, y: currentLevelData.forbidden.y, frame: 0, type: 'forbidden' }]);
                                    setMessage(`!!! 警報 !!! 武器觸碰 ${currentLevelData.forbidden.label}！任務失敗。系統重置。`);
                                    isTerminated = true;
                                    setTimeout(() => {
                                        resetGame();
                                        setIsFiring(false);
                                    }, 1500);
                                }
                            }
                        }
                        ctx.shadowBlur = 0;
                        
                        if (isTerminated) return;
                        
                        const mathXCurrent = (endX - centerX) / gridScale;
                        
                        // 檢查是否擊中友軍
                        allies.forEach(al => {
                            try {
                                const weaponY = code.evaluate({ x: al.x });
                                if (Math.abs(mathXCurrent - al.x) < 0.35 && Math.abs(weaponY - al.y) < 0.6) {
                                    setExplosions(exps => [...exps, { x: al.x, y: al.y, frame: 0, type: 'ally' }]);
                                    setMessage(`!!! 警報 !!! 擊中友軍 ${al.label}！任務失敗。系統重置。`);
                                    isTerminated = true;
                                    setTimeout(() => {
                                        resetGame();
                                        setIsFiring(false);
                                    }, 1500);
                                }
                            } catch(e) {}
                        });

                        if (isTerminated) return;

                        // 檢查擊中敵人
                        setEnemies(prev => prev.map(en => {
                            if (!en.alive) return en;
                            try {
                                const targetY = code.evaluate({ x: en.x });
                                if (Math.abs(mathXCurrent - en.x) < 0.35 && Math.abs(targetY - en.y) < 0.6) {
                                    setExplosions(exps => [...exps, { x: en.x, y: en.y, frame: 0, type: 'enemy' }]);
                                    return { ...en, alive: false };
                                }
                            } catch(e) {}
                            return en;
                        }));

                        currentScreenX += step;
                        animationRef.current = requestAnimationFrame(animate);
                    };
                    animate();
                } catch (err) {
                    setMessage('ERROR: 無法解析路徑公式。');
                    setIsFiring(false);
                }
            };

            const resetGame = () => {
                const current = levelData[level];
                setEnemies(current.enemies.map(e => ({...e, alive: true})));
                setAllies(current.allies || []);
                setExplosions([]);
                setInternalPower(100);
                setMessage(`系統重啟。Level ${level}: ${current.hint}`);
                if (animationRef.current) cancelAnimationFrame(animationRef.current);
                setIsFiring(false);
            };

            return (
                <div className="flex flex-col items-center justify-start min-h-screen p-2 md:p-6 select-none bg-[#050505]">
                    <div className="w-full max-w-5xl flex justify-between items-end mb-2 border-b-4 border-orange-500 pb-2">
                        <div className="text-4xl md:text-6xl font-black italic tracking-tighter">NERV <span className="text-xl not-italic font-normal tracking-widest ml-4 hidden md:inline">TACTICAL MONITOR</span></div>
                        <div className="text-right flex items-center gap-6">
                            <div className="text-right">
                                <div className="text-[10px] uppercase font-bold text-orange-700">Level Progression</div>
                                <div className="text-2xl font-black">{level} / 6</div>
                            </div>
                            <div className="text-right">
                                <div className="text-[10px] uppercase font-bold text-orange-700">Internal Power</div>
                                <div className="text-2xl font-black">{internalPower.toFixed(1)}%</div>
                            </div>
                        </div>
                    </div>

                    <div className="relative w-full max-w-5xl flex gap-2">
                        <div className="hidden lg:flex flex-col gap-2 w-12 text-[10px] bg-orange-500/10 p-1 border border-orange-500/30">
                            <div className="vertical-text h-full text-center py-2 text-orange-500/60 font-bold">MONITORING_SYSTEM_ACTIVE</div>
                            <div className="bg-orange-500 text-black font-black p-1 text-center">{level.toString().padStart(2, '0')}</div>
                        </div>

                        <div ref={containerRef} className="canvas-container border-4 border-orange-500 overflow-hidden bg-black flex-1">
                            <canvas 
                                ref={canvasRef} 
                                width={canvasSize.width} 
                                height={canvasSize.height} 
                                className="w-full h-full block"
                            />
                            
                            {isFiring && (
                                <div className="absolute inset-0 pointer-events-none flex items-center justify-center border-[20px] border-red-600/30 emergency-blink">
                                    <div className="bg-red-600 text-white px-8 py-2 font-black text-4xl rotate-[-5deg] shadow-2xl">EMERGENCY</div>
                                </div>
                            )}

                            <div className="absolute top-2 left-2 text-[10px] text-orange-400 font-bold">SYNC_RATE: 41.3%</div>
                            <div className="absolute bottom-2 right-2 text-[10px] text-cyan-400 font-bold bg-cyan-950/50 px-2 flex flex-col items-end">
                                <span>FRIENDLY_FIRE: PROHIBITED</span>
                                {levelData[level].forbidden && <span className="text-[#ff00ff]">DEFENSE_NET: AVOID {levelData[level].forbidden.y}</span>}
                            </div>
                        </div>
                    </div>

                    <div className="w-full max-w-5xl eva-panel p-4 md:p-8 border-2 border-orange-600/50">
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-end">
                            <div className="lg:col-span-8">
                                <div className="flex justify-between mb-1">
                                    <span className="text-xs font-black tracking-widest text-orange-500 uppercase">Weaponry Path Analysis // LEVEL {level}</span>
                                    <span className="text-xs text-orange-800 font-bold">SCALE: 1 UNIT = {gridScale} PX</span>
                                </div>
                                <div className="relative flex items-center">
                                    <span className="absolute left-4 text-2xl font-black italic text-orange-600">f(x)=</span>
                                    <input
                                        type="text"
                                        value={userInput}
                                        onChange={(e) => setUserInput(e.target.value)}
                                        disabled={isFiring}
                                        className="eva-input w-full pl-20 pr-4 py-4 text-3xl font-black italic focus:outline-none"
                                        placeholder="INPUT FORMULA"
                                    />
                                </div>
                            </div>

                            <div className="lg:col-span-4 flex gap-4">
                                <button
                                    onClick={handleFire}
                                    disabled={isFiring}
                                    className={`eva-button flex-1 py-5 text-2xl tracking-[0.2em] ${isFiring ? 'opacity-50 grayscale cursor-not-allowed' : ''}`}
                                >
                                    {isFiring ? 'BUSY' : '發射'}
                                </button>
                                <button
                                    onClick={resetGame}
                                    className="px-6 py-5 bg-black border border-orange-950 text-orange-900 font-bold text-xs hover:text-orange-500 transition-colors"
                                >
                                    RESET
                                </button>
                            </div>
                        </div>

                        <div className="mt-6 grid grid-cols-1 md:grid-cols-4 gap-4 items-center border-t border-orange-500/20 pt-4">
                            <div className="md:col-span-3 flex items-center gap-4">
                                <div className="bg-orange-600 text-black px-2 py-1 text-xs font-black">SYSTEM_MSG</div>
                                <div className={`font-bold tracking-widest text-sm overflow-hidden whitespace-nowrap ${message.includes('ERROR') || message.includes('警報') ? 'text-red-500 animate-pulse' : 'text-orange-200'}`}>
                                    {message}
                                </div>
                            </div>
                            <div className="flex justify-end gap-2 text-[9px] text-orange-900 font-black uppercase">
                                <span>MAGI_CASPER_LEVEL_{level}</span>
                            </div>
                        </div>
                    </div>

                    <div className="mt-4 w-full max-w-5xl text-[8px] md:text-[10px] text-orange-900 flex justify-between px-2 uppercase font-bold">
                        <div>Top Secret // Classified Tactical Logic</div>
                        <div>(c) 2026 NERV Tech Labs // Pilot Training Protocol</div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
