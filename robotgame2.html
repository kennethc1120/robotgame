<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math SRW: Operation Graph</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React, ReactDOM 與 Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Math.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        body { background-color: black; margin: 0; overflow-x: hidden; }
        canvas { image-rendering: crisp-edges; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 資源配置區 ---
        // 背景圖網址 (建議使用深色星空或科技感背景)
        const BG_IMAGE_URL = './img/background.png';
        // 小兵圖片網址
        const ENEMY_IMAGE_URL = './img/enemy.png'; 

        const App = () => {
            const canvasRef = useRef(null);
            const enemyImgRef = useRef(null);
            const bgImgRef = useRef(null);
            const [userInput, setUserInput] = useState('0.5x + 1');
            const [message, setMessage] = useState('系統連線中...');
            const [isAssetsLoaded, setIsAssetsLoaded] = useState(false);
            const [enemies, setEnemies] = useState([
                { id: 1, x: 4, y: 3, alive: true, label: '小兵A' },
                { id: 2, x: -5, y: 2, alive: true, label: '小兵B' },
                { id: 3, x: 2, y: -4, alive: true, label: '精英機' },
                { id: 4, x: -3, y: -2, alive: true, label: '偵察機' }
            ]);
            const [isFiring, setIsFiring] = useState(false);

            const gridScale = 35; 
            const animationRef = useRef(null);

            // 預載入所有圖片資源
            useEffect(() => {
                let loadedCount = 0;
                const totalAssets = 2;

                const checkAllLoaded = () => {
                    loadedCount++;
                    if (loadedCount >= totalAssets) {
                        setIsAssetsLoaded(true);
                        setMessage('戰術地圖加載完成，請輸入攻擊函數。');
                    }
                };

                // 加載小兵
                const eImg = new Image();
                eImg.src = ENEMY_IMAGE_URL;
                eImg.onload = () => { enemyImgRef.current = eImg; checkAllLoaded(); };
                eImg.onerror = () => checkAllLoaded();

                // 加載背景
                const bImg = new Image();
                bImg.src = BG_IMAGE_URL;
                bImg.onload = () => { bgImgRef.current = bImg; checkAllLoaded(); };
                bImg.onerror = () => checkAllLoaded();
            }, []);

            const drawBase = (ctx, currentEnemies) => {
                const { width, height } = ctx.canvas;
                const centerX = width / 2;
                const centerY = height / 2;

                // 1. 繪製背景圖
                if (bgImgRef.current) {
                    ctx.save();
                    ctx.globalAlpha = 0.4; // 背景透明度，讓網格更明顯
                    ctx.drawImage(bgImgRef.current, 0, 0, width, height);
                    ctx.restore();
                } else {
                    ctx.fillStyle = '#050a05';
                    ctx.fillRect(0, 0, width, height);
                }

                // 2. 網格與座標軸 (在背景之上)
                ctx.strokeStyle = '#1a331a';
                ctx.lineWidth = 1;
                for (let x = centerX % gridScale; x < width; x += gridScale) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
                }
                for (let y = centerY % gridScale; y < height; y += gridScale) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
                }

                ctx.strokeStyle = '#33ff33';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(width, centerY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, height); ctx.stroke();

                // 3. 繪製敵人
                currentEnemies.forEach(en => {
                    if (!en.alive) return;
                    const sx = centerX + en.x * gridScale;
                    const sy = centerY - en.y * gridScale;

                    if (enemyImgRef.current) {
                        ctx.drawImage(enemyImgRef.current, sx - 15, sy - 15, 30, 30);
                    } else {
                        ctx.fillStyle = '#ff3333';
                        ctx.beginPath();
                        ctx.moveTo(sx, sy - 15);
                        ctx.lineTo(sx + 15, sy + 10);
                        ctx.lineTo(sx - 15, sy + 10);
                        ctx.closePath();
                        ctx.fill();
                    }

                    // 目標鎖定框
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(sx - 18, sy - 18, 36, 36);

                    // 標籤
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 12px Courier New';
                    ctx.fillText(`${en.label} (${en.x}, ${en.y})`, sx + 20, sy + 5);
                });
            };

            useEffect(() => {
                if (isAssetsLoaded) {
                    const ctx = canvasRef.current.getContext('2d');
                    drawBase(ctx, enemies);
                }
            }, [enemies, isAssetsLoaded]);

            const handleFire = () => {
                if (isFiring) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                
                try {
                    const preparedInput = userInput.replace(/(\d)(x)/g, '$1*$2');
                    const node = math.parse(preparedInput);
                    const code = node.compile();

                    setIsFiring(true);
                    setMessage('武裝解除鎖定... 激光發射！');

                    let currentX = 0;
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;

                    const animate = () => {
                        if (currentX > canvas.width) {
                            setIsFiring(false);
                            checkEndGame();
                            return;
                        }

                        ctx.strokeStyle = '#33ffff';
                        ctx.lineWidth = 4;
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = '#00ffff';
                        
                        ctx.beginPath();
                        const startX = currentX;
                        const endX = currentX + 8;
                        
                        const calcY = (screenX) => {
                            const mathX = (screenX - centerX) / gridScale;
                            const mathY = code.evaluate({ x: mathX });
                            return centerY - mathY * gridScale;
                        };

                        const y1 = calcY(startX);
                        const y2 = calcY(endX);

                        if (!isNaN(y1) && !isNaN(y2)) {
                            ctx.moveTo(startX, y1);
                            ctx.lineTo(endX, y2);
                            ctx.stroke();
                        }
                        ctx.shadowBlur = 0;

                        const mathXCurrent = (endX - centerX) / gridScale;
                        setEnemies(prev => prev.map(en => {
                            if (!en.alive) return en;
                            const targetY = code.evaluate({ x: en.x });
                            if (Math.abs(mathXCurrent - en.x) < 0.15 && Math.abs(targetY - en.y) < 0.4) {
                                drawExplosion(ctx, centerX + en.x * gridScale, centerY - en.y * gridScale);
                                setMessage(`Target Confirmed! ${en.label} 擊破！`);
                                return { ...en, alive: false };
                            }
                            return en;
                        }));

                        currentX += 8;
                        animationRef.current = requestAnimationFrame(animate);
                    };
                    animate();
                } catch (err) {
                    setMessage('警告：函數解析失敗！請確認語法。');
                    setIsFiring(false);
                }
            };

            const drawExplosion = (ctx, x, y) => {
                ctx.fillStyle = '#ffff00';
                ctx.beginPath(); ctx.arc(x, y, 35, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ff6600';
                ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI * 2); ctx.fill();
            };

            const checkEndGame = () => {
                setEnemies(prev => {
                    if (prev.length > 0 && prev.every(e => !e.alive)) {
                        setMessage('MISSION COMPLETE! 敵機全數殲滅！');
                    }
                    return prev;
                });
            };

            const resetGame = () => {
                setEnemies([
                    { id: 1, x: 4, y: 3, alive: true, label: '小兵A' },
                    { id: 2, x: -5, y: 2, alive: true, label: '小兵B' },
                    { id: 3, x: 2, y: -4, alive: true, label: '精英機' },
                    { id: 4, x: -3, y: -2, alive: true, label: '偵察機' }
                ]);
                setMessage('等待指令中... 敵機座標已重置。');
                if (animationRef.current) cancelAnimationFrame(animationRef.current);
                setIsFiring(false);
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-black text-green-400 p-4 font-mono">
                    <div className="mb-4 text-2xl md:text-3xl font-bold tracking-widest border-b-2 border-green-400 pb-2 text-center uppercase">
                        Math SRW: Operation Graph
                    </div>

                    <div className="relative group w-full max-w-4xl">
                        <canvas
                            ref={canvasRef}
                            width={800}
                            height={500}
                            className="border-4 border-green-900 rounded-lg shadow-[0_0_30px_rgba(34,197,94,0.2)] w-full h-auto"
                        />
                        <div className="absolute top-4 right-4 bg-black/80 p-2 border border-green-500 text-[10px] md:text-xs">
                            雷達系統運作中 | 1 單位 = 35px
                        </div>
                    </div>

                    <div className="mt-6 w-full max-w-4xl bg-zinc-900 p-4 md:p-6 border-t-4 border-blue-600 rounded-b-xl shadow-2xl">
                        <div className="flex flex-col lg:flex-row gap-6 items-center">
                            <div className="flex-1 w-full">
                                <label className="block text-blue-400 mb-2 text-sm uppercase tracking-wider">主武裝輸出：f(x)=</label>
                                <input
                                    type="text"
                                    value={userInput}
                                    onChange={(e) => setUserInput(e.target.value)}
                                    disabled={isFiring}
                                    className="w-full bg-black border-2 border-blue-900 p-4 text-2xl focus:border-blue-400 outline-none transition-all text-cyan-400 font-bold"
                                    placeholder="例如: x^2, sin(x), 2x+1"
                                />
                            </div>
                            
                            <div className="flex gap-3 w-full lg:w-auto">
                                <button
                                    onClick={handleFire}
                                    disabled={isFiring}
                                    className={`flex-1 lg:flex-none px-10 py-4 font-black text-2xl uppercase skew-x-[-15deg] transition-all ${
                                        isFiring ? 'bg-zinc-800 text-zinc-600' : 'bg-red-700 hover:bg-red-600 text-white shadow-[6px_6px_0px_#450a0a]'
                                    }`}
                                >
                                    {isFiring ? 'Firing' : 'Attack!'}
                                </button>
                                <button
                                    onClick={resetGame}
                                    className="px-6 py-4 bg-zinc-800 hover:bg-zinc-700 text-zinc-400 border border-zinc-700 font-bold uppercase"
                                >
                                    Reset
                                </button>
                            </div>
                        </div>

                        <div className="mt-5 p-4 bg-black border-l-4 border-yellow-500 text-sm md:text-base italic min-h-[3.5rem] flex items-center">
                            <span className="text-yellow-600 mr-3 font-bold not-italic">[SYSTEM LOG]:</span>
                            {message}
                        </div>

                        <div className="mt-6 grid grid-cols-2 md:grid-cols-4 gap-3 text-[10px] md:text-xs">
                            <div className="bg-zinc-800/50 p-2 border border-zinc-700 rounded text-center">二次方: x^2</div>
                            <div className="bg-zinc-800/50 p-2 border border-zinc-700 rounded text-center">絕對值: abs(x)</div>
                            <div className="bg-zinc-800/50 p-2 border border-zinc-700 rounded text-center">三角函數: sin(x)</div>
                            <div className="bg-zinc-800/50 p-2 border border-zinc-700 rounded text-center">開方: sqrt(x)</div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
