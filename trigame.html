<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trig-Beat: 化簡三角函數 100 秒挑戰</title>
    <style>
        body { 
            margin: 0; padding: 0; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; 
            background-image: url('./img/trigame_bg.png');
            background-size: cover;
            background-position: center;
        }

        body::before {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.75); 
            z-index: -1;
        }

        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; z-index: 1; }
        
        #header { display: flex; justify-content: space-between; padding: 15px 30px; background-color: rgba(22, 33, 62, 0.8); font-size: 24px; font-weight: bold; z-index: 10; border-bottom: 2px solid #e94560; backdrop-filter: blur(5px); }
        #timer { color: #e94560; text-shadow: 0 0 10px #e94560; }
        #combo { color: #f9a826; text-shadow: 0 0 10px #f9a826; }
        
        #play-area { flex-grow: 1; position: relative; overflow: hidden; }
        
        #play-area::after {
            content: ""; position: absolute; bottom: 20px; left: 0; width: 100%; height: 2px;
            background-color: rgba(67, 235, 218, 0.5); box-shadow: 0 0 10px #43ebda; z-index: 0;
        }

        /* 移除了 transition 解決亂飄問題 */
        .falling-question { position: absolute; left: 50%; transform: translateX(-50%); background-color: rgba(15, 52, 96, 0.9); border: 2px solid #43ebda; border-radius: 10px; padding: 15px 30px; font-size: 32px; font-weight: bold; box-shadow: 0 0 15px #43ebda; text-align: center; white-space: nowrap; z-index: 5; }
        .danger { border-color: #e94560; box-shadow: 0 0 20px #e94560; background-color: rgba(90, 15, 30, 0.9); }

        #controls { height: 200px; background-color: rgba(22, 33, 62, 0.9); display: flex; padding: 10px; gap: 10px; z-index: 10; backdrop-filter: blur(10px); border-top: 2px solid #43ebda; }
        .control-group { flex: 1; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-content: center; }
        .btn { flex: 1 1 40%; height: 60px; font-size: 24px; font-weight: bold; border: 2px solid #2a2a4a; border-radius: 8px; cursor: pointer; transition: 0.1s; background-color: rgba(42, 42, 74, 0.8); color: white; text-shadow: 1px 1px 2px black; }
        .btn:active { transform: scale(0.95); }
        .btn.selected { background-color: #e94560; color: white; border-color: #ff5c77; box-shadow: 0 0 15px #e94560; }
        
        #flash-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 20; }
        .flash-red { background-color: rgba(233, 69, 96, 0.4); opacity: 1 !important; }
        .flash-green { background-color: rgba(67, 235, 218, 0.3); opacity: 1 !important; }

        /* 開始/結束畫面與排行榜樣式 */
        #overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; overflow-y: auto; padding: 20px;}
        h1 { font-size: 56px; color: #43ebda; margin-bottom: 10px; text-align: center; text-shadow: 0 0 20px #43ebda; letter-spacing: 2px; }
        .desc-box { background: rgba(0,0,0,0.5); padding: 15px 30px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-size: 18px; line-height: 1.5; border: 1px solid rgba(67, 235, 218, 0.3);}
        
        /* 姓名輸入框 */
        #player-name { padding: 12px 20px; font-size: 20px; font-weight: bold; border-radius: 8px; border: 2px solid #43ebda; background-color: rgba(15, 52, 96, 0.8); color: white; text-align: center; margin-bottom: 20px; width: 250px; outline: none; }
        #player-name:focus { box-shadow: 0 0 15px #43ebda; }

        .start-btn { padding: 15px 50px; font-size: 28px; font-weight: bold; background: linear-gradient(45deg, #e94560, #ff5c77); color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px rgba(233, 69, 96, 0.5); transition: transform 0.2s; margin-bottom: 20px; }
        .start-btn:hover { transform: scale(1.05); }

        /* 龍虎榜樣式 */
        #leaderboard { background-color: rgba(22, 33, 62, 0.9); border: 2px solid #f9a826; border-radius: 10px; padding: 15px 25px; width: 300px; box-shadow: 0 0 15px rgba(249, 168, 38, 0.5); }
        #leaderboard h2 { margin: 0 0 10px 0; color: #f9a826; text-align: center; font-size: 24px; text-shadow: 0 0 5px #f9a826; }
        .lb-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 18px; }
        .lb-row:last-child { border-bottom: none; }
        .lb-rank-1 { color: #ffd700; font-weight: bold; } /* 金 */
        .lb-rank-2 { color: #c0c0c0; font-weight: bold; } /* 銀 */
        .lb-rank-3 { color: #cd7f32; font-weight: bold; } /* 銅 */

/* 打擊文字動畫 */
.hit-text {
    position: absolute;
    font-size: 40px;
    font-weight: bold;
    pointer-events: none;
    animation: hit-float 0.6s ease-out forwards;
    z-index: 100;
    text-shadow: 0 0 10px white;
}

@keyframes hit-float {
    0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
    50% { transform: translate(-50%, -50px) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -100px) scale(1); opacity: 0; }
}

/* 粒子爆炸特效 */
.particle {
    position: absolute;
    width: 8px;
    height: 8px;
    background-color: #43ebda;
    border-radius: 50%;
    pointer-events: none;
    z-index: 99;
}

/* 狂熱模式邊框閃爍 */
@keyframes fever-glow {
    0% { box-shadow: inset 0 0 20px #e94560; }
    50% { box-shadow: inset 0 0 60px #ff5c77; }
    100% { box-shadow: inset 0 0 20px #e94560; }
}

.fever-mode {
    animation: fever-glow 0.5s infinite;
    border: 4px solid #ff5c77 !important;
}
/* Final Rush 螢幕閃爍 */
@keyframes final-rush-blink {
    0% { background-color: rgba(233, 69, 96, 0); }
    50% { background-color: rgba(233, 69, 96, 0.15); }
    100% { background-color: rgba(233, 69, 96, 0); }
}

.final-rush-active {
    animation: final-rush-blink 1s infinite;
}

#final-rush-text {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 80px;
    font-weight: bold;
    color: #ff5c77;
    text-shadow: 0 0 20px #ff5c77;
    z-index: 100;
    pointer-events: none;
    display: none;
    opacity: 0;
}

@keyframes rush-appear {
    0% { transform: translate(-50%, -50%) scale(5); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
}       
    </style>
</head>
<body>

<audio id="bg-music" loop src="Winning_Sequence.mp3"></audio>

<div id="game-container">
    <div id="header">
        <div id="score-display">分數: 0</div>
        <div id="combo-display" style="opacity: 0;">Combo: 0</div>
        <div id="timer">100 s</div>
    </div>

    <div id="play-area">
        <div id="final-rush-text">FINAL RUSH!!</div>
        <div id="question-box" class="falling-question" style="top: -100px;">sin(180° + x)</div>
    </div>

    <div id="controls">
        <div class="control-group" style="flex: 0.5;">
            <button class="btn sign-btn" data-val="+">＋</button>
            <button class="btn sign-btn" data-val="-">－</button>
        </div>
        <div class="control-group" style="flex: 1.5;">
            <button class="btn func-btn" data-val="sin">sin x</button>
            <button class="btn func-btn" data-val="cos">cos x</button>
            <button class="btn func-btn" data-val="tan">tan x</button>
            <button class="btn func-btn" data-val="cot">1 / tan x</button>
        </div>
    </div>
    
    <div id="flash-overlay"></div>
</div>

<div id="overlay-screen">
    <h1 id="screen-title">TRIG-BEAT<br>化簡三角函數</h1>
    
    <div id="screen-desc" class="desc-box">
        👉 先選正負號，再選函數。<br>
        👉 記住「奇變偶不變，符號看象限」！<br>
        掉落到底部或答錯將扣 50 分！
    </div>

    <input type="text" id="player-name" placeholder="請輸入你的暱稱..." maxlength="10">
    
    <button class="start-btn" onclick="startGame()" id="action-btn">開始挑戰</button>

    <div id="leaderboard">
        <h2>🏆 龍虎榜 Top 5 🏆</h2>
        <div id="leaderboard-list">
            </div>
    </div>
</div>

<script>
    // 遊戲變數
    let score = 0;
    let combo = 0;
    let timeLeft = 100;
    let gameInterval;
    let fallInterval;
    let isPlaying = false;
    let currentPlayerName = "無名戰士";
    
    let currentAnsSign = '';
    let currentAnsFunc = '';
    let questionY = -100;
    let fallSpeed = 2;

    let selectedSign = null;
    let selectedFunc = null;

    const funcs = ['sin', 'cos', 'tan'];
    const angles = [90, 180, 270, 360];
    const operators = ['+', '-'];

    // DOM 元素
    const scoreEl = document.getElementById('score-display');
    const comboEl = document.getElementById('combo-display');
    const timerEl = document.getElementById('timer');
    const questionBox = document.getElementById('question-box');
    const flashOverlay = document.getElementById('flash-overlay');
    const overlayScreen = document.getElementById('overlay-screen');
    const bgMusic = document.getElementById('bg-music');
    const playerNameInput = document.getElementById('player-name');
    const leaderboardList = document.getElementById('leaderboard-list');

    bgMusic.volume = 0.4;

// --- 排行榜 (Google Sheet) 系統 ---
    
    // 【重要】：請把下面這串引號裡的網址，換成你剛剛在步驟二複製的「網頁應用程式網址」
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx-89FN4ZOHRo-kqVhGBQ2V_rWRtrZtqcFUU7VkVSUjseyEpqj7vO2YILNRDtEknrnU/exec"; 

    // 從 Google Sheet 讀取排行榜
    async function loadLeaderboard() {
        leaderboardList.innerHTML = '<div style="text-align:center; color:#ccc;">📡 正在連線雲端榜單...</div>';
        try {
            const response = await fetch(SCRIPT_URL);
            const board = await response.json();
            updateLeaderboardUI(board);
        } catch(e) {
            leaderboardList.innerHTML = '<div style="text-align:center; color:#e94560;">連線失敗，請檢查網路</div>';
            console.error(e);
        }
    }

// 將新分數寫入 Google Sheet (已加入 CORS 防護設定)
    async function saveScoreToLeaderboard(name, finalScore) {
        document.getElementById('action-btn').innerText = "☁️ 正在上傳成績...";
        document.getElementById('action-btn').disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                // 加入 headers，告訴瀏覽器這是純文字，避免觸發嚴格的 CORS 檢查
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                },
                body: JSON.stringify({ name: name, score: finalScore })
            });
            
            // 寫入後等待 1 秒讓 Google Sheet 處理，再重新讀取榜單
            setTimeout(async () => {
                await loadLeaderboard();
                document.getElementById('action-btn').innerText = "再來一局";
                document.getElementById('action-btn').disabled = false;
            }, 1000);

        } catch(e) {
            console.error("上傳失敗", e);
            document.getElementById('action-btn').innerText = "上傳失敗，點此重試";
            document.getElementById('action-btn').disabled = false;
        }
    }

    // 更新畫面上的排行榜清單
    function updateLeaderboardUI(board) {
        leaderboardList.innerHTML = ''; 
        
        if (board.length === 0) {
            leaderboardList.innerHTML = '<div style="text-align:center; color:#ccc;">尚無紀錄，快來搶首殺！</div>';
            return;
        }

        board.forEach((entry, index) => {
            const row = document.createElement('div');
            row.className = 'lb-row';
            
            let rankClass = '';
            if(index === 0) rankClass = 'lb-rank-1';
            else if(index === 1) rankClass = 'lb-rank-2';
            else if(index === 2) rankClass = 'lb-rank-3';

            row.innerHTML = `<span class="${rankClass}">#${index + 1} ${entry.name}</span><span class="${rankClass}">${entry.score}</span>`;
            leaderboardList.appendChild(row);
        });
    }

    // 網頁一打開時，先載入一次雲端排行榜
    loadLeaderboard();


    // --- 遊戲邏輯 ---
function generateQuestion() {
        const baseFunc = funcs[Math.floor(Math.random() * funcs.length)];
        const operator = operators[Math.floor(Math.random() * operators.length)];
        
        // --- 角度多樣化邏輯 ---
        let availableAngles;
        if (timeLeft > 70) {
            // 前 30 秒：只出現 180, 360 (偶不變)
            availableAngles = [180, 360];
        } else if (timeLeft > 30) {
            // 中間 40 秒：混合出現
            availableAngles = [90, 180, 270, 360];
        } else {
            // 最後 30 秒：提高 90, 270 (奇變) 的出現機率
            availableAngles = [90, 90, 270, 270, 180, 360]; 
        }

        const angleBase = availableAngles[Math.floor(Math.random() * availableAngles.length)];
        questionBox.innerText = `${baseFunc}(${angleBase}° ${operator} x)`;
        
        // 移除舊的 danger 邏輯，改為純內部判斷
        questionBox.classList.remove('danger');

        // 答案邏輯不變
        let testAngle = operator === '+' ? angleBase + 30 : angleBase - 30;
        testAngle = (testAngle + 360) % 360;

        let isPositive = false;
        if (testAngle > 0 && testAngle < 90) isPositive = true;
        else if (testAngle > 90 && testAngle < 180) isPositive = (baseFunc === 'sin');
        else if (testAngle > 180 && testAngle < 270) isPositive = (baseFunc === 'tan');
        else if (testAngle > 270 && testAngle < 360) isPositive = (baseFunc === 'cos');

        currentAnsSign = isPositive ? '+' : '-';
        currentAnsFunc = baseFunc;
        if (angleBase === 90 || angleBase === 270) {
            if (baseFunc === 'sin') currentAnsFunc = 'cos';
            else if (baseFunc === 'cos') currentAnsFunc = 'sin';
            else if (baseFunc === 'tan') currentAnsFunc = 'cot';
        }

        questionY = -100;
        
       // --- 速度計算：初期放慢，後期加速感倍增 ---
        let timeElapsed = 100 - timeLeft; // 計算遊戲已經經過了幾秒 (0 ~ 100)
        
        // 1. 基礎起步速度調降（原本 2.5 -> 改為 1.2，一開始很慢）
        let baseSpeed = 1.2; 
        
        // 2. 時間加速幅度調高（原本每秒 0.03 -> 改為每秒 0.06，時間越久越快）
        let timeBonus = timeElapsed * 0.06; 
        
        // 3. Final Rush 階段給予極大壓力
        if (timeLeft <= 30) {
            timeBonus += 2.5; 
        }
        
        // 4. Combo 加成稍微降低，避免前期連擊讓速度突然爆衝（0.15 -> 0.1）
        let comboBonus = combo * 0.1;
        
        // 總和計算
        fallSpeed = baseSpeed + comboBonus + timeBonus; 
        
        // 限制最高速（建議設在 12，如果超過 15 掉落方塊可能會因為畫面更新率直接穿透底線判定）
        if (fallSpeed > 10) fallSpeed = 10;
        
        resetSelection();
    }

    function resetSelection() {
        selectedSign = null;
        selectedFunc = null;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
    }

   function checkAnswer() {
        if (selectedSign && selectedFunc) {
            if (selectedSign === currentAnsSign && selectedFunc === currentAnsFunc) {
                // 觸發特效
                spawnHitText(questionY, combo >= 10 ? 'PERFECT!' : 'GREAT!');
                spawnParticles(questionY);
                
                combo++;
                checkFeverMode(); // 檢查是否進入狂熱

                let points = 100;
                if (combo >= 5) points = 120;
                if (combo >= 10) points = 150;
                score += points;
                
                comboEl.style.opacity = 1;
                comboEl.innerText = `Combo: ${combo} 🔥`;
                updateScore();
                triggerFlash('flash-green');
                generateQuestion();
            } else {
                handleWrongAnswer();
            }
        }
    }

   function handleWrongAnswer() {
        combo = 0;
        checkFeverMode(); // 移除狂熱邊框
        score -= 50;
        comboEl.style.opacity = 0;
        updateScore();
        triggerFlash('flash-red');
        generateQuestion();
    }

    function updateScore() {
        scoreEl.innerText = `分數: ${score}`;
    }

    function triggerFlash(className) {
        flashOverlay.className = '';
        flashOverlay.classList.add(className);
        setTimeout(() => {
            flashOverlay.className = '';
        }, 150);
    }

    function updateGameLoop() {
        if (!isPlaying) return;
        questionY += fallSpeed;
        questionBox.style.top = questionY + 'px';

        const playAreaHeight = document.getElementById('play-area').offsetHeight;
        const boxHeight = questionBox.offsetHeight;

        // 【精準判定修正】方塊底部碰到軌道線才算Miss
        if ((questionY + boxHeight) > (playAreaHeight - 20)) {
            handleWrongAnswer();
        }
    }
 // 1. 產生打擊文字 (PERFECT / GREAT)
    function spawnHitText(y, type) {
        const text = document.createElement('div');
        text.className = 'hit-text';
        text.innerText = type;
        text.style.left = '50%';
        text.style.top = y + 'px';
        text.style.color = (type === 'PERFECT!') ? '#f9a826' : '#43ebda';
        document.getElementById('play-area').appendChild(text);
        setTimeout(() => text.remove(), 600);
    }

    // 2. 產生粒子爆炸
    function spawnParticles(y) {
        const container = document.getElementById('play-area');
        for (let i = 0; i < 12; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = '50%';
            p.style.top = y + 'px';
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = 2 + Math.random() * 5;
            const vx = Math.cos(angle) * velocity;
            const vy = Math.sin(angle) * velocity;
            
            container.appendChild(p);

            let posX = 0;
            let posY = 0;
            let opacity = 1;

            const moveParticle = setInterval(() => {
                posX += vx;
                posY += vy;
                opacity -= 0.05;
                p.style.transform = `translate(${posX}px, ${posY}px)`;
                p.style.opacity = opacity;
                if (opacity <= 0) {
                    clearInterval(moveParticle);
                    p.remove();
                }
            }, 16);
        }
    }

    // 3. 檢查並觸發狂熱模式
    function checkFeverMode() {
        const container = document.getElementById('game-container');
        if (combo >= 10) {
            container.classList.add('fever-mode');
        } else {
            container.classList.remove('fever-mode');
        }
    }
    function startGame() {
        // 抓取玩家姓名，沒輸入則給預設值
        const inputName = playerNameInput.value.trim();
        currentPlayerName = inputName !== "" ? inputName : "無名戰士";

        overlayScreen.style.display = 'none';
        score = 0;
        combo = 0;
        timeLeft = 100;
        isPlaying = true;
        updateScore();
        comboEl.style.opacity = 0;
        
        // 👇--- 新增這段：重置 Final Rush 狀態 ---👇
        document.getElementById('game-container').classList.remove('final-rush-active');
        const rushText = document.getElementById('final-rush-text');
        if(rushText) {
            rushText.style.display = 'none';
            rushText.style.animation = 'none';
        }
        bgMusic.playbackRate = 1.0; // 恢復正常音樂速度
        // 👆-----------------------------------👆
        
        bgMusic.currentTime = 0;
        bgMusic.play().catch(e => console.log("等待點擊播放"));

        generateQuestion();

gameInterval = setInterval(() => {
            timeLeft--;
            timerEl.innerText = `${timeLeft} s`;

            // 觸發 Final Rush 特效
            if (timeLeft === 30) {
                triggerFinalRush();
            }

            if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);

    function triggerFinalRush() {
        const rushText = document.getElementById('final-rush-text');
        const container = document.getElementById('game-container');
        
        // 顯示大文字動畫
        rushText.style.display = 'block';
        rushText.style.animation = 'rush-appear 1.5s forwards';
        
        // 螢幕開始閃爍
        container.classList.add('final-rush-active');
        
        // 音樂加速 (HTML5 Audio 支援 playbackRate)
        bgMusic.playbackRate = 1.3; 
        
        // 震動 (若設備支援)
        if (window.navigator.vibrate) window.navigator.vibrate(500);
    }

        fallInterval = setInterval(updateGameLoop, 16);
    }

function endGame() {
        isPlaying = false;
        clearInterval(gameInterval);
        clearInterval(fallInterval);
        bgMusic.pause();
        
        // 1. 先把結束畫面的文字準備好
        document.getElementById('screen-title').innerText = "時間到！";
        document.getElementById('screen-desc').innerHTML = `玩家 <b>${currentPlayerName}</b> 的最終分數：<br><strong style="color:#f9a826; font-size:48px; display:block; margin: 10px 0;">${score}</strong>`;
        
        // 隱藏姓名輸入框，避免結束畫面太擁擠
        playerNameInput.style.display = 'none'; 
        
        // 2. 顯示結束畫面與排行榜（解決定格問題）
        overlayScreen.style.display = 'flex';

        // 3. 最後才觸發雲端上傳成績（裡面的程式會自動處理上傳與刷新榜單）
        saveScoreToLeaderboard(currentPlayerName, score);
    }
    // --- 按鈕點擊事件監聽 ---
    document.querySelectorAll('.sign-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            if (!isPlaying) return; // 遊戲沒開始就不能按
            document.querySelectorAll('.sign-btn').forEach(b => b.classList.remove('selected'));
            e.target.classList.add('selected');
            selectedSign = e.target.getAttribute('data-val');
            checkAnswer();
        });
    });

    document.querySelectorAll('.func-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            if (!isPlaying) return; // 遊戲沒開始就不能按
            document.querySelectorAll('.func-btn').forEach(b => b.classList.remove('selected'));
            e.target.classList.add('selected');
            selectedFunc = e.target.getAttribute('data-val');
            checkAnswer();
        });
    });
</script>
