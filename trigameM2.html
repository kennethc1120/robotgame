<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trig-Beat: 化簡三角函數 100 秒太空挑戰 (M2版) </title>
    <style>
        body { 
        margin: 0; padding: 0; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; 
        /* 這裡改成黑色背景，當螢幕比例不符時會顯示為黑邊 */
        background-color: #000; 
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        }

        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 5, 15, 0.85); z-index: -1;
        }
        
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 4px, 100% 100%; z-index: -1; pointer-events: none; opacity: 0.2;
        }

        #game-container { 
            position: relative; 
            /* 換成你指定的新比例 */
            width: 450px; 
            height: 850px; 
            display: flex; 
            flex-direction: column; 
            z-index: 1; 
            background-image: url('./img/trigameM2_bg.png');
            background-size: cover;
            background-position: center;
            transform-origin: center center; 
            overflow: hidden;
            box-shadow: 0 0 50px rgba(67, 235, 218, 0.2); 
        }
        #header { display: flex; justify-content: space-between; padding: 15px 30px; background-color: rgba(10, 10, 20, 0.85); font-size: 24px; font-weight: bold; z-index: 10; border-bottom: 2px solid #43ebda; backdrop-filter: blur(5px); box-shadow: 0 0 20px #43ebda; }
        
        #timer { color: #ff004c; text-shadow: 0 0 10px #ff004c; }
        #timer.danger-timer { animation: danger-blink 0.5s infinite; color: #ff5c77; text-shadow: 0 0 20px #ff5c77; }
        
        #combo { color: #f9a826; text-shadow: 0 0 10px #f9a826; }
        
        #play-area { flex-grow: 1; position: relative; overflow: hidden; }
        
        #play-area::after {
            content: ""; position: absolute; bottom: 20px; left: 0; width: 100%; height: 2px;
            background-color: rgba(168, 218, 220, 0.5); box-shadow: 0 0 20px #a8dadc; z-index: 0;
        }

        .falling-question { position: absolute; left: 50%; transform: translateX(-50%); background-color: rgba(15, 30, 60, 0.9); border: 2px solid #43ebda; border-radius: 10px; padding: 15px 30px; font-size: 32px; font-weight: bold; box-shadow: 0 0 20px #43ebda; text-align: center; white-space: nowrap; z-index: 5; }
        
        .danger { border-color: #ff004c; box-shadow: 0 0 30px #ff004c; background-color: rgba(80, 10, 20, 0.9); }

        #controls { padding: 15px; background-color: rgba(10, 10, 20, 0.95); display: flex; gap: 15px; z-index: 10; backdrop-filter: blur(10px); border-top: 2px solid #a8dadc; box-shadow: 0 0 20px #a8dadc; align-items: stretch; }
        
        .control-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-content: center; }
        .sign-group { flex: 0.5; flex-direction: column; }
        .func-group { flex: 2.5; }
        
        .btn { font-weight: bold; border: 2px solid #4a5a7a; border-radius: 8px; cursor: pointer; transition: 0.1s, border-color 0.2s, box-shadow 0.2s; background-color: rgba(25, 35, 65, 0.6); color: white; text-shadow: 1px 1px 2px black; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .sign-group .btn { flex: 1; width: 100%; font-size: 32px; min-height: 60px; }
        .func-group .btn { flex: 1 1 30%; height: 60px; font-size: 22px; }
        
        .btn::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            transition: opacity 0.2s; opacity: 0; pointer-events: none;
        }
        
        .btn:hover::before { opacity: 1; }
        .btn:hover { border-color: #43ebda; box-shadow: 0 0 15px #43ebda; }
        .btn:active { transform: scale(0.95); }
        
        .btn.selected { background-color: #ff004c; color: white; border-color: #ff5c77; box-shadow: 0 0 20px #ff004c; text-shadow: 0 0 5px white; }
        
        #flash-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 20; }
        .flash-red { background-color: rgba(255, 0, 76, 0.3); opacity: 1 !important; }
        .flash-green { background-color: rgba(67, 235, 218, 0.2); opacity: 1 !important; }

        #overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(5, 5, 15, 0.95); background-image: radial-gradient(rgba(67, 235, 218, 0.05) 1px, transparent 1px); background-size: 20px 20px; backdrop-filter: blur(8px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; overflow-y: auto; padding: 20px;}
        
        h1 { font-size: 56px; color: #43ebda; margin-bottom: 10px; text-align: center; text-shadow: 0 0 30px #43ebda, 0 0 10px #43ebda; letter-spacing: 4px; }
        
        .desc-box { background: rgba(10, 20, 40, 0.6); padding: 15px 30px; border-radius: 10px; margin-bottom: 20px; text-align: center; font-size: 18px; line-height: 1.5; border: 1px solid rgba(67, 235, 218, 0.4); box-shadow: 0 0 15px rgba(67, 235, 218, 0.2); }
        
        #player-name { padding: 12px 20px; font-size: 20px; font-weight: bold; border-radius: 8px; border: 2px solid #a8dadc; background-color: rgba(10, 20, 40, 0.8); color: white; text-align: center; margin-bottom: 20px; width: 250px; outline: none; box-shadow: 0 0 10px rgba(168, 218, 220, 0.3); }
        #player-name:focus { box-shadow: 0 0 20px #a8dadc; border-color: #43ebda; }

        .start-btn { padding: 15px 50px; font-size: 28px; font-weight: bold; background: linear-gradient(45deg, #ff004c, #ff5c77, #8338ec, #43ebda); background-size: 300% 300%; animation: start-btn-glow 3s infinite; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 25px rgba(255, 0, 76, 0.6); transition: transform 0.2s, box-shadow 0.2s; margin-bottom: 20px; text-shadow: 0 0 5px white; }
        .start-btn:hover { transform: scale(1.05); box-shadow: 0 5px 35px rgba(255, 0, 76, 0.8); }

        #leaderboard { background-color: rgba(10, 10, 20, 0.95); border: 2px solid #a8dadc; border-radius: 10px; padding: 15px 25px; width: 300px; box-shadow: 0 0 20px #a8dadc; }
        #leaderboard h2 { margin: 0 0 10px 0; color: #f9a826; text-align: center; font-size: 24px; text-shadow: 0 0 10px #f9a826; }
        .lb-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(168, 218, 220, 0.2); font-size: 18px; }
        .lb-row:last-child { border-bottom: none; }
        .lb-rank-1 { color: #ffd700; font-weight: bold; text-shadow: 0 0 5px #ffd700; } 
        .lb-rank-2 { color: #c0c0c0; font-weight: bold; text-shadow: 0 0 5px #c0c0c0; } 
        .lb-rank-3 { color: #cd7f32; font-weight: bold; text-shadow: 0 0 5px #cd7f32; } 

        .hit-text { position: absolute; font-size: 40px; font-weight: bold; pointer-events: none; animation: hit-float 0.6s ease-out forwards; z-index: 100; text-shadow: 0 0 15px white, 0 0 5px white; }
        @keyframes hit-float {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50px) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -100px) scale(1); opacity: 0; }
        }

        .particle { position: absolute; width: 8px; height: 8px; background-color: #43ebda; border-radius: 50%; pointer-events: none; z-index: 99; box-shadow: 0 0 10px #43ebda; }

        @keyframes fever-glow {
            0% { box-shadow: inset 0 0 20px #ff004c; border-color: #ff004c; }
            50% { box-shadow: inset 0 0 70px #8338ec; border-color: #8338ec; }
            100% { box-shadow: inset 0 0 20px #ff004c; border-color: #ff004c; }
        }
        .fever-mode { animation: fever-glow 0.5s infinite; border: 4px solid #ff004c !important; }
        
        @keyframes final-rush-blink {
            0% { background-color: rgba(255, 0, 76, 0); }
            50% { background-color: rgba(255, 0, 76, 0.25); }
            100% { background-color: rgba(255, 0, 76, 0); }
        }
        .final-rush-active { animation: final-rush-blink 1s infinite; }

        #final-rush-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; font-weight: bold; color: #ff004c; text-shadow: 0 0 30px #ff004c, 0 0 10px #ff004c; z-index: 100; pointer-events: none; display: none; opacity: 0; }
        @keyframes rush-appear {
            0% { transform: translate(-50%, -50%) scale(5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }
        
        @keyframes danger-blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        
        @keyframes start-btn-glow {
            0% { background-position: 0% 50%; box-shadow: 0 5px 25px rgba(255, 0, 76, 0.6); }
            50% { background-position: 100% 50%; box-shadow: 0 5px 35px rgba(67, 235, 218, 0.7); }
            100% { background-position: 0% 50%; box-shadow: 0 5px 25px rgba(255, 0, 76, 0.6); }
        }
    </style>
</head>
<body>

<audio id="bg-music" loop src="Winning_Sequence.mp3"></audio>

<div id="game-container">
    <div id="header">
        <div id="score-display">分數: 0</div>
        <div id="combo-display" style="opacity: 0;">Combo: 0</div>
        <div id="timer">100 s</div>
    </div>

    <div id="play-area">
        <div id="final-rush-text">FINAL RUSH!!</div>
        <div id="question-box" class="falling-question" style="top: -100px;">sin(π + x)</div>
    </div>

    <div id="controls">
        <div class="control-group sign-group">
            <button class="btn sign-btn" data-val="+">＋</button>
            <button class="btn sign-btn" data-val="-">－</button>
        </div>
        <div class="control-group func-group">
            <button class="btn func-btn" data-val="sin">sin x</button>
            <button class="btn func-btn" data-val="cos">cos x</button>
            <button class="btn func-btn" data-val="tan">tan x</button>
            <button class="btn func-btn" data-val="cot">cot x</button>
            <button class="btn func-btn" data-val="sec">sec x</button>
            <button class="btn func-btn" data-val="csc">csc x</button>
        </div>
    </div>
    
    <div id="flash-overlay"></div>
</div>

<div id="overlay-screen">
    <h1 id="screen-title">TRIG-BEAT<br>化簡三角函數<br>太空挑戰 (M2c版) </h1>
    
    <div id="screen-desc" class="desc-box">
        👉 先選正負號，再選函數。<br>
        👉 記住「正負看象限，奇變偶不變」！<br>
        掉落到底部或答錯將扣 50 分！
    </div>

    <input type="text" id="player-name" placeholder="請輸入你的暱稱..." maxlength="10">
    
    <button class="start-btn" onclick="startGame()" id="action-btn">開始挑戰</button>

    <div id="leaderboard">
        <h2>🏆 🏆 Top 5 🏆 🏆</h2>
        <div id="leaderboard-list">
        </div>
    </div>
</div>

<script>
// ====== 畫面自動等比例縮放系統 ======
function resizeGame() {
    const gameContainer = document.getElementById('game-container');
    const windowWidth = window.innerWidth;
    const windowHeight = window.innerHeight;
    
    // 配合 CSS 的設定，更新基準大小
    const baseWidth = 450;
    const baseHeight = 850;
    
    const scaleX = windowWidth / baseWidth;
    const scaleY = windowHeight / baseHeight;
    const scale = Math.min(scaleX, scaleY);
    
    gameContainer.style.transform = `scale(${scale})`;
}

// 監聽視窗大小改變事件 (例如手機旋轉、電腦拉視窗)
window.addEventListener('resize', resizeGame);

// 網頁一載入就先執行一次，把大小調好
resizeGame();
    
    // 遊戲變數
    let score = 0;
    let combo = 0;
    let timeLeft = 100;
    let gameInterval;
    let fallInterval;
    let isPlaying = false;
    let currentPlayerName = "無名戰士";
    
    let currentAnsSign = '';
    let currentAnsFunc = '';
    let questionY = -100;
    let fallSpeed = 2;

    let selectedSign = null;
    let selectedFunc = null;
    let wrongQuestions = {};

    let cachedPlayAreaHeight = 0;
    let cachedBoxHeight = 0;
    
    const funcs = ['sin', 'cos', 'tan', 'cot', 'sec', 'csc'];
    const angles = [90, 180, 270, 360];
    const operators = ['+', '-'];

    const radianMap = {
        90: 'π/2',
        180: 'π',
        270: '3π/2',
        360: '2π'
    };

    const scoreEl = document.getElementById('score-display');
    const comboEl = document.getElementById('combo-display');
    const timerEl = document.getElementById('timer');
    const questionBox = document.getElementById('question-box');
    const flashOverlay = document.getElementById('flash-overlay');
    const overlayScreen = document.getElementById('overlay-screen');
    const bgMusic = document.getElementById('bg-music');
    const playerNameInput = document.getElementById('player-name');
    const leaderboardList = document.getElementById('leaderboard-list');
    const playArea = document.getElementById('play-area');

    bgMusic.volume = 0.4;

    function sanitizeHTML(str) {
        return str.replace(/[&<>'"]/g, 
            tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag)
        );
    }

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzMqhh9aH9fEYMfoIEmZrbxtUnIivdKemFya1XAX3abZJbD6ZSCcIp1Ci10MOlIJhc7og/exec"; 

    async function loadLeaderboard() {
        leaderboardList.innerHTML = '<div style="text-align:center; color:#ccc;">📡 正在連線雲端榜單...</div>';
        try {
            const response = await fetch(SCRIPT_URL);
            const board = await response.json();
            updateLeaderboardUI(board);
        } catch(e) {
            leaderboardList.innerHTML = '<div style="text-align:center; color:#ff004c;">連線失敗，請檢查網路</div>';
            console.error(e);
        }
    }

    async function saveScoreToLeaderboard(name, finalScore) {
        document.getElementById('action-btn').innerText = "☁️ 正在上傳成績...";
        document.getElementById('action-btn').disabled = true;

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ name: name, score: finalScore })
            });
            setTimeout(async () => {
                await loadLeaderboard();
                document.getElementById('action-btn').innerText = "再來一局";
                document.getElementById('action-btn').disabled = false;
            }, 1000);
        } catch(e) {
            console.error("上傳失敗", e);
            document.getElementById('action-btn').innerText = "上傳失敗 (點此再來一局)";
            document.getElementById('action-btn').disabled = false;
        }
    }

    function updateLeaderboardUI(board) {
        leaderboardList.innerHTML = ''; 
        if (board.length === 0) {
            leaderboardList.innerHTML = '<div style="text-align:center; color:#ccc;">尚無紀錄，快來搶首殺！</div>';
            return;
        }
        board.forEach((entry, index) => {
            const row = document.createElement('div');
            row.className = 'lb-row';
            let rankClass = index === 0 ? 'lb-rank-1' : index === 1 ? 'lb-rank-2' : index === 2 ? 'lb-rank-3' : '';
            row.innerHTML = `<span class="${rankClass}">#${index + 1} ${sanitizeHTML(entry.name)}</span><span class="${rankClass}">${entry.score}</span>`;
            leaderboardList.appendChild(row);
        });
    }

    loadLeaderboard();

    function generateQuestion() {
        const baseFunc = funcs[Math.floor(Math.random() * funcs.length)];
        const operator = operators[Math.floor(Math.random() * operators.length)];
        
        let availableAngles;
        if (timeLeft > 70) availableAngles = [180, 360];
        else if (timeLeft > 30) availableAngles = [90, 180, 270, 360];
        else availableAngles = [90, 90, 270, 270, 180, 360]; 

        const angleBase = availableAngles[Math.floor(Math.random() * availableAngles.length)];
        
        questionBox.innerText = `${baseFunc}(${radianMap[angleBase]} ${operator} x)`;
        questionBox.classList.remove('danger');

        setTimeout(() => {
            cachedPlayAreaHeight = playArea.offsetHeight;
            cachedBoxHeight = questionBox.offsetHeight;
        }, 0);

        let testAngle = operator === '+' ? angleBase + 30 : angleBase - 30;
        testAngle = (testAngle + 360) % 360;

        let isPositive = false;
        if (testAngle > 0 && testAngle < 90) isPositive = true;
        else if (testAngle > 90 && testAngle < 180) isPositive = (baseFunc === 'sin' || baseFunc === 'csc');
        else if (testAngle > 180 && testAngle < 270) isPositive = (baseFunc === 'tan' || baseFunc === 'cot');
        else if (testAngle > 270 && testAngle < 360) isPositive = (baseFunc === 'cos' || baseFunc === 'sec');

        currentAnsSign = isPositive ? '+' : '-';
        currentAnsFunc = baseFunc;
        
        if (angleBase === 90 || angleBase === 270) {
            if (baseFunc === 'sin') currentAnsFunc = 'cos';
            else if (baseFunc === 'cos') currentAnsFunc = 'sin';
            else if (baseFunc === 'tan') currentAnsFunc = 'cot';
            else if (baseFunc === 'cot') currentAnsFunc = 'tan';
            else if (baseFunc === 'sec') currentAnsFunc = 'csc';
            else if (baseFunc === 'csc') currentAnsFunc = 'sec';
        }

        questionY = -100;
        
// ====== 速度調整區塊 ======
let timeElapsed = 100 - timeLeft; 

// 1. 初始基本速度 (原本是 1.0，調慢成 0.6)
let baseSpeed = 0.6; 

// 2. 隨時間增加的難度 (原本乘 0.03，調降成 0.01，讓它慢慢變快)
let timeBonus = timeElapsed * 0.02; 

// 3. 最後 30 秒 (Final Rush) 的額外加速 (原本加 1.0，調降成只加 0.5)
if (timeLeft <= 30) timeBonus += 1.0; 

// 4. 連擊帶來的加速 (原本乘 0.1，調降成 0.05)
let comboBonus = combo * 0.1;

// 計算總速度
fallSpeed = baseSpeed + comboBonus + timeBonus; 

// 5. 最高速度限制！(原本高達 6.5，現在限制最高只能到 3.0)
if (fallSpeed > 4.5) fallSpeed = 4.5;
        
        resetSelection();
    }

    function resetSelection() {
        selectedSign = null;
        selectedFunc = null;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
    }

    function checkAnswer() {
        if (selectedSign && selectedFunc) {
            if (selectedSign === currentAnsSign && selectedFunc === currentAnsFunc) {
                spawnHitText(questionY, combo >= 10 ? 'PERFECT!' : 'GREAT!');
                spawnParticles(questionY);
                
                combo++;
                checkFeverMode();

                let points = 100;
                if (combo >= 5) points = 120;
                if (combo >= 10) points = 150;
                score += points;
                
                comboEl.style.opacity = 1;
                comboEl.innerText = `Combo: ${combo} 🔥`;
                updateScore();
                triggerFlash('flash-green');
                generateQuestion();
            } else {
                handleWrongAnswer();
            }
        }
    }

    function handleWrongAnswer() {
        const currentQ = questionBox.innerText;
        if (wrongQuestions[currentQ]) {
            wrongQuestions[currentQ]++; 
        } else {
            wrongQuestions[currentQ] = 1; 
        }
        combo = 0;
        checkFeverMode(); 
        score -= 50;
        comboEl.style.opacity = 0;
        updateScore();
        triggerFlash('flash-red');
        generateQuestion();
    }

    function updateScore() {
        scoreEl.innerText = `分數: ${score}`;
    }

    function triggerFlash(className) {
        flashOverlay.className = '';
        flashOverlay.classList.add(className);
        setTimeout(() => flashOverlay.className = '', 150);
    }

function updateGameLoop() {
    if (!isPlaying) return;
    questionY += fallSpeed;
    questionBox.style.top = questionY + 'px';

    // 高度拉長到 850 後，Y 大約大於 680 就算觸底失敗
    if (questionY > 680) {
        handleWrongAnswer();
    }
}

    function spawnHitText(y, type) {
        const text = document.createElement('div');
        text.className = 'hit-text';
        text.innerText = type;
        text.style.left = '50%';
        text.style.top = y + 'px';
        text.style.color = (type === 'PERFECT!') ? '#f9a826' : '#43ebda';
        playArea.appendChild(text);
        setTimeout(() => text.remove(), 600);
    }

    function spawnParticles(y) {
        for (let i = 0; i < 12; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = '50%';
            p.style.top = y + 'px';
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = 2 + Math.random() * 5;
            const vx = Math.cos(angle) * velocity;
            const vy = Math.sin(angle) * velocity;
            
            playArea.appendChild(p);

            let posX = 0;
            let posY = 0;
            let opacity = 1;

            const moveParticle = setInterval(() => {
                posX += vx;
                posY += vy;
                opacity -= 0.05;
                p.style.transform = `translate(${posX}px, ${posY}px)`;
                p.style.opacity = opacity;
                if (opacity <= 0) {
                    clearInterval(moveParticle);
                    p.remove();
                }
            }, 16);
        }
    }

    function checkFeverMode() {
        const container = document.getElementById('game-container');
        if (combo >= 10) container.classList.add('fever-mode');
        else container.classList.remove('fever-mode');
    }

    function startGame() {
        clearInterval(gameInterval);
        clearInterval(fallInterval);

        const inputName = playerNameInput.value.trim();
        currentPlayerName = inputName !== "" ? sanitizeHTML(inputName) : "無名戰士";
        wrongQuestions = {}; 

        overlayScreen.style.display = 'none';
        score = 0;
        combo = 0;
        timeLeft = 100;
        isPlaying = true;
        updateScore();
        comboEl.style.opacity = 0;
        
        document.getElementById('game-container').classList.remove('final-rush-active');
        const rushText = document.getElementById('final-rush-text');
        if(rushText) {
            rushText.style.display = 'none';
            rushText.style.animation = 'none';
        }
        timerEl.classList.remove('danger-timer');
        bgMusic.playbackRate = 1.0; 
        
        bgMusic.currentTime = 0;
        bgMusic.play().catch(e => console.log("等待點擊播放"));

        generateQuestion();

        gameInterval = setInterval(() => {
            timeLeft--;
            timerEl.innerText = `${timeLeft} s`;
            
            if (timeLeft < 10) timerEl.classList.add('danger-timer');
            if (timeLeft === 30) triggerFinalRush();
            if (timeLeft <= 0) endGame();
        }, 1000);

        function triggerFinalRush() {
            const rushText = document.getElementById('final-rush-text');
            const container = document.getElementById('game-container');
            rushText.style.display = 'block';
            rushText.style.animation = 'rush-appear 1.5s forwards';
            container.classList.add('final-rush-active');
            bgMusic.playbackRate = 1.3; 
            if (window.navigator.vibrate) window.navigator.vibrate(500);
        }

        fallInterval = setInterval(updateGameLoop, 16);
    }

    function endGame() {
        isPlaying = false;
        clearInterval(gameInterval);
        clearInterval(fallInterval);
        bgMusic.pause();
        timerEl.classList.remove('danger-timer');
        
        let title = "";
        let titleColor = "";
        if (score <= 1000) {
            title = "🌱 三角初學小朋友";
            titleColor = "#a8e6cf";
        } else if (score <= 3000) {
            title = "⚔️ 三角恆定式修行者";
            titleColor = "#ffd3b6";
        } else if (score <= 5000) {
            title = "🧙‍♂️ 弧度與函數大師";
            titleColor = "#ff8b94";
        } else {
            title = "👑 宇宙三角函數之神";
            titleColor = "#f9a826";
        }

        let wrongArray = Object.entries(wrongQuestions).sort((a, b) => b[1] - a[1]);
        let wrongHTML = "";
        
        if (wrongArray.length > 0) {
            wrongHTML = `
                <div style='margin-top: 15px; font-size: 16px; color: #ff5c77; text-align: left; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 92, 119, 0.5); box-shadow: 0 0 10px rgba(255, 92, 119, 0.3);'>
                    <strong>💀 💀 弱點回顧 (出錯次數)：💀 💀</strong><br>
            `;
            let maxDisplay = Math.min(3, wrongArray.length);
            for (let i = 0; i < maxDisplay; i++) {
                wrongHTML += `• ${wrongArray[i][0]} (錯了 ${wrongArray[i][1]} 次)<br>`;
            }
            wrongHTML += "</div>";
        } else {
            wrongHTML = "<div style='margin-top: 15px; font-size: 18px; color: #43ebda; text-shadow: 0 0 10px #43ebda;'>太神啦！一題都沒錯！🎉 🎉</div>";
        }

        document.getElementById('screen-title').innerText = "時間到！";
        document.getElementById('screen-desc').innerHTML = `
            玩家 <b>${currentPlayerName}</b><br>
            獲得稱號：<span style="color:${titleColor}; font-weight:bold; font-size:24px; text-shadow: 0 0 5px ${titleColor};">${title}</span><br>
            最終分數：<strong style="color:#f9a826; font-size:48px; display:block; margin: 10px 0; text-shadow: 0 0 15px #f9a826;">${score}</strong>
            ${wrongHTML}
        `;
        
        playerNameInput.style.display = 'none'; 
        overlayScreen.style.display = 'flex';
        saveScoreToLeaderboard(currentPlayerName, score);
    }

    // 螢幕大小變更時，重新計算快取高度，避免破圖或判定異常
    window.addEventListener('resize', () => {
        if (playArea && questionBox) {
            cachedPlayAreaHeight = playArea.offsetHeight;
            cachedBoxHeight = questionBox.offsetHeight;
        }
    });

    // 綁定正負號按鈕事件
    document.querySelectorAll('.sign-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            if (!isPlaying) return;
            document.querySelectorAll('.sign-btn').forEach(b => b.classList.remove('selected'));
            e.target.classList.add('selected');
            selectedSign = e.target.getAttribute('data-val');
            checkAnswer();
        });
    });

    // 綁定函數按鈕事件
    document.querySelectorAll('.func-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            if (!isPlaying) return;
            document.querySelectorAll('.func-btn').forEach(b => b.classList.remove('selected'));
            e.target.classList.add('selected');
            selectedFunc = e.target.getAttribute('data-val');
            checkAnswer();
        });
    });

    // 鍵盤快速鍵支援
    window.addEventListener('keydown', (e) => {
        if (!isPlaying) return;
        
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
            document.querySelector('.sign-btn[data-val="+"]').click();
        } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
            document.querySelector('.sign-btn[data-val="-"]').click();
        }
        
        const funcMap = { '1': 'sin', '2': 'cos', '3': 'tan', '4': 'cot', '5': 'sec', '6': 'csc' };
        if (funcMap[e.key]) {
            document.querySelector(`.func-btn[data-val="${funcMap[e.key]}"]`).click();
        }
    });
</script>
</body>
</html>
